<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Screenshots of SchellingBoard: proposing sessions, voting, building the schedule, and more." />
  <title>Screenshots — SchellingBoard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      background: #f9f9f9;
      border-bottom: 1px solid #e5e5e5;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    header h1 span {
      color: #e05a5a;
    }

    header p.tagline {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #555;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #555;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-link:hover {
      color: #1a1a1a;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .intro {
      color: #555;
      margin-bottom: 2.5rem;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    figure {
      margin: 0;
      text-align: center;
    }

    figure img {
      display: inline-block;
      max-width: 100%;
      height: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      cursor: zoom-in;
    }

    figcaption {
      margin-top: 0.8rem;
    }

    figcaption .step-title {
      display: block;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.2rem;
    }

    figcaption .step-desc {
      color: #555;
      font-size: 0.93rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: min(100%, 1000px);
      max-height: 85vh;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .lightbox-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      color: #eee;
      font-size: 0.9rem;
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .lightbox-close {
      top: 1.2rem;
      right: 1.2rem;
    }

    .lightbox-prev {
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next {
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #e5e5e5;
    }

    footer a { color: #555; }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html">Schelling<span>Board</span></a></h1>
  <p class="tagline">Screenshots</p>
</header>

<main>
  <a class="back-link" href="index.html">&larr; Back to home</a>

  <h2>Screenshots</h2>
  <p class="intro">A look at SchellingBoard's screens, from proposing a session to seeing it on the schedule. Click any screenshot to zoom in.</p>

  <div class="steps">

    <figure data-full="screenshots/add-proposal.png" data-caption="Propose a session — Attendees submit an idea in seconds, only a title is required.">
      <img src="screenshots/add-proposal.png" loading="lazy" alt="Add Session Proposal form with title, description, host, and duration fields" />
      <figcaption>
        <span class="step-title">1. Propose a session</span>
        <span class="step-desc">Attendees submit an idea in seconds &mdash; only a title is required.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/proposals-list.png" data-caption="Browse and vote — Filter, search, and vote Interested / Maybe / Skip right from the list.">
      <img src="screenshots/proposals-list.png" loading="lazy" alt="List of session proposals with search, filters, and one-click Interested / Maybe / Skip voting" />
      <figcaption>
        <span class="step-title">2. Browse and vote</span>
        <span class="step-desc">Filter, search, and vote Interested / Maybe / Skip right from the list.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/quick-voting.png" data-caption="Quick Voting mode — Swipe through every proposal one at a time to vote quickly on all of them.">
      <img src="screenshots/quick-voting.png" loading="lazy" alt="Quick Voting mode showing one proposal at a time with a vote count and large vote buttons" />
      <figcaption>
        <span class="step-title">3. Quick Voting mode</span>
        <span class="step-desc">Swipe through every proposal one at a time to vote quickly on all of them.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/schedule-grid.png" data-caption="Build the schedule — Hosts drag proposals onto a time-and-room grid, with room photos, capacity, and location shown inline.">
      <img src="screenshots/schedule-grid.png" loading="lazy" alt="Drag-and-drop scheduling grid with rooms as columns and time slots as rows" />
      <figcaption>
        <span class="step-title">4. Build the schedule</span>
        <span class="step-desc">Hosts drag proposals onto a time-and-room grid, with room photos, capacity, and location shown inline.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/session-details.png" data-caption="Session details, at a glance — Click any scheduled session for hosts, attendees, timing, and notices like closed/limited-capacity sessions.">
      <img src="screenshots/session-details.png" loading="lazy" alt="Session detail popup with host, location, time, attendee list, and a closed-session notice" />
      <figcaption>
        <span class="step-title">5. Session details, at a glance</span>
        <span class="step-desc">Click any scheduled session for hosts, attendees, timing, and notices like closed/limited-capacity sessions.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/mobile-schedule.png" data-caption="Works great on mobile — The full schedule is usable on a phone, so attendees can check it on the go.">
      <img src="screenshots/mobile-schedule.png" loading="lazy" alt="The scheduling grid rendered on a mobile phone screen" />
      <figcaption>
        <span class="step-title">6. Works great on mobile</span>
        <span class="step-desc">The full schedule is usable on a phone, so attendees can check it on the go.</span>
      </figcaption>
    </figure>

    <figure data-full="screenshots/participant-profile.png" data-caption="Participant profiles — Everyone gets a profile with their bio, hosted sessions, proposals, and what they're attending.">
      <img src="screenshots/participant-profile.png" loading="lazy" alt="Participant profile page showing bio, sessions hosted, proposals made, and sessions they're attending" />
      <figcaption>
        <span class="step-title">7. Participant profiles</span>
        <span class="step-desc">Everyone gets a profile with their bio, hosted sessions, proposals, and what they're attending.</span>
      </figcaption>
    </figure>

  </div>
</main>

<footer>
  <p>
    MIT License &mdash;
    <a href="https://github.com/LWCW-Europe/schelling-board">github.com/LWCW-Europe/schelling-board</a>
  </p>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button class="lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
  <p class="lightbox-caption" id="lightbox-caption"></p>
</div>

<script>
  var figures = Array.prototype.slice.call(document.querySelectorAll('.steps figure'));
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  var lightboxCaption = document.getElementById('lightbox-caption');
  var current = 0;

  function show(index) {
    current = (index + figures.length) % figures.length;
    var fig = figures[current];
    lightboxImg.src = fig.getAttribute('data-full');
    lightboxImg.alt = fig.querySelector('img').alt;
    lightboxCaption.textContent = fig.getAttribute('data-caption');
    lightbox.classList.add('open');
  }

  function close() {
    lightbox.classList.remove('open');
  }

  figures.forEach(function (fig, index) {
    fig.querySelector('img').addEventListener('click', function () {
      show(index);
    });
  });

  document.getElementById('lightbox-close').addEventListener('click', close);
  document.getElementById('lightbox-prev').addEventListener('click', function () { show(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', function () { show(current + 1); });

  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>

</body>
</html>
