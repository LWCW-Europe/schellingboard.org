<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Screenshots of SchellingBoard: proposing sessions, voting, building the schedule, and more." />
  <title>Screenshots — SchellingBoard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      background: #f9f9f9;
      border-bottom: 1px solid #e5e5e5;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    header h1 span {
      color: #e05a5a;
    }

    header p.tagline {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #555;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #555;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-link:hover {
      color: #1a1a1a;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .intro {
      color: #555;
      margin-bottom: 2rem;
    }

    h3.section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2.5rem 0 -0.5rem;
      color: #333;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    figure {
      margin: 0;
      text-align: center;
    }

    figure img {
      display: inline-block;
      max-width: 100%;
      height: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      cursor: zoom-in;
    }

    figure.mobile img {
      max-width: 280px;
    }

    figcaption {
      margin-top: 0.8rem;
    }

    figcaption .step-title {
      display: block;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.2rem;
    }

    figcaption .step-desc {
      color: #555;
      font-size: 0.93rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: min(100%, 1000px);
      max-height: 85vh;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .lightbox-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      color: #eee;
      font-size: 0.9rem;
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .lightbox-close {
      top: 1.2rem;
      right: 1.2rem;
    }

    .lightbox-prev {
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next {
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #e5e5e5;
    }

    footer a { color: #555; }
  </style>
</head>
<body>

  <p class="tagline">Screenshots</p>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button class="lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
  <p class="lightbox-caption" id="lightbox-caption"></p>
</div>

<script>
  var figures = Array.prototype.slice.call(document.querySelectorAll('.steps figure'));
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  var lightboxCaption = document.getElementById('lightbox-caption');
  var current = 0;

  function show(index) {
    current = (index + figures.length) % figures.length;
    var fig = figures[current];
    lightboxImg.src = fig.getAttribute('data-full');
    lightboxImg.alt = fig.querySelector('img').alt;
    lightboxCaption.textContent = fig.getAttribute('data-caption');
    lightbox.classList.add('open');
  }

  function close() {
    lightbox.classList.remove('open');
  }

  figures.forEach(function (fig, index) {
    fig.querySelector('img').addEventListener('click', function () {
      show(index);
    });
  });

  document.getElementById('lightbox-close').addEventListener('click', close);
  document.getElementById('lightbox-prev').addEventListener('click', function () { show(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', function () { show(current + 1); });

  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>
